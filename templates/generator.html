<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasswordGenerator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='generator.css') }}">
</head>
<body>

<header>
    <nav>
    <div class="header">
        <div class="logo-menu"><b>⟠🔐⟠ PasswordNexus</b></div>
        <div class="menu-items">
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('generate_password') }}">Generator</a>
            <a href="{{ url_for('analyzer') }}">Analyzer</a>
            <a href="{{ url_for('page_brute') }}">Brute_force_time</a>
            <a href="{{ url_for('page_hash') }}">Hash coverter</a>
            <a href="{{ url_for('page_base') }}">Base enc/dec</a>
        </div>
    </div>
    </nav>
</header>

<div class="generatorbox">
    <form action="{{ url_for('generate_password') }}" method="POST" autocomplete="off" style="width: 89%; display: flex; flex-direction: column; align-items: center; color:white;">
        <h1 class="generatorheading"><strong>🔐Password Generator</strong></h1>

        <div class="enterlengthbox">
            <input type="number" name="length" placeholder="Enter Length (8-50)" min="8" max="50" required>
        </div>

        <div class="verifygenerator">
            <label><input type="checkbox" required> Agree to <a href="{{ url_for('page_terms') }}" target="_blank" class="term">Terms</a></label>
        </div>

        <button type="submit">Generate Password</button>
    </form>

    {% if result %}
    <div class="result">
        <p style="margin-bottom: 5px; color: #aaa; font-size: 12px;"><b>Generated Password:</b></p>
        <strong>{{ result }}</strong>
    </div>
    {% endif %}
</div>

<footer>
    <div class="footer">
        <p>© 2025 Air University | Cybersecurity Project</p>
    </div>
</footer>

</body>
</html>
